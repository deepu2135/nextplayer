name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build apk and run tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set Up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          validate-wrappers: true
          gradle-home-cache-cleanup: true

      - name: Build Project with gradle
        run: ./gradlew assembleDebug

      - name: Run Local Tests
        run: ./gradlew test

      - name: Lint Checks
        run: ./gradlew ktlintCheck

      # Upload all build artifacts in separate steps.
      - name: Upload artifact nextplayer-universal-debug.apk
        uses: actions/upload-artifact@v4
        with:
          name: nextplayer-universal-debug.apk
          path: ./app/build/outputs/apk/debug/app-universal-debug.apk
      - name: Upload artifact nextplayer-arm64-v8a-debug.apk
        uses: actions/upload-artifact@v4
        with:
          name: nextplayer-arm64-v8a-debug.apk
          path: ./app/build/outputs/apk/debug/app-arm64-v8a-debug.apk
      - name: Upload artifact nextplayer-armeabi-v7a-debug.apk
        uses: actions/upload-artifact@v4
        with:
          name: nextplayer-armeabi-v7a-debug.apk
          path: ./app/build/outputs/apk/debug/app-armeabi-v7a-debug.apk
      - name: Upload artifact nextplayer-x86_64-debug.apk
        uses: actions/upload-artifact@v4
        with:
          name: nextplayer-x86_64-debug.apk
          path: ./app/build/outputs/apk/debug/app-x86_64-debug.apk
      - name: Upload artifact nextplayer-x86-debug.apk
        uses: actions/upload-artifact@v4
        with:
          name: nextplayer-x86-debug.apk
          path: ./app/build/outputs/apk/debug/app-x86-debug.apk

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: app/build/reports

      - name: Prepare Release APKs
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cd app/build/outputs/apk/debug/
          cp app-universal-debug.apk nextplayer-universal-debug.apk
          cp app-arm64-v8a-debug.apk nextplayer-arm64-v8a-debug.apk
          cp app-armeabi-v7a-debug.apk nextplayer-armeabi-v7a-debug.apk
          cp app-x86-debug.apk nextplayer-x86-debug.apk
          cp app-x86_64-debug.apk nextplayer-x86_64-debug.apk

      - name: Update Nightly Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          draft: false
          make_latest: true
          files: |
            app/build/outputs/apk/debug/nextplayer-universal-debug.apk
            app/build/outputs/apk/debug/nextplayer-arm64-v8a-debug.apk
            app/build/outputs/apk/debug/nextplayer-armeabi-v7a-debug.apk
            app/build/outputs/apk/debug/nextplayer-x86-debug.apk
            app/build/outputs/apk/debug/nextplayer-x86_64-debug.apk
          body: "Auto-generated nightly build from the latest push to main."



