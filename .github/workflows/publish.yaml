name: Publish Android App

on:
  push:
    branches:
      - 'release/v*.*.*'
    tags:
      - 'v*.*.*'
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get updated version name and version code
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            version_name=${GITHUB_REF#refs/tags/v}
          elif [[ $GITHUB_REF == refs/heads/release/v* ]]; then
            version_name=${GITHUB_REF#refs/heads/release/v}
          else
            version_name=$(echo "$GITHUB_REF" | sed -e 's|.*/v||')
          fi

          # Store values as environment variables
          echo "VERSION_NAME=$version_name" >> $GITHUB_ENV

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.0
          bundler-cache: true

      - name: Set Up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          validate-wrappers: true

      - name: Check Keystore Secret
        id: check_keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE }}" ]; then
            echo "has_keystore=true" >> $GITHUB_OUTPUT
          else
            echo "has_keystore=false" >> $GITHUB_OUTPUT
          fi

      - name: Decode keystore file
        if: steps.check_keystore.outputs.has_keystore == 'true'
        uses: timheuer/base64-to-file@v2
        id: keystore
        with:
          fileName: 'keystore.jks'
          encodedString: ${{ secrets.KEYSTORE }}

      - name: Decode Play API credentials file
        if: steps.check_keystore.outputs.has_keystore == 'true'
        uses: timheuer/base64-to-file@v2
        id: play_api_credentials
        with:
          fileName: 'play-api-credentials.json'
          encodedString: ${{ secrets.PLAY_API_CREDENTIALS }}

      - name: Build app and publish via Fastlane
        if: steps.check_keystore.outputs.has_keystore == 'true'
        run: bundle exec fastlane publish
        env:
          TRACK: "internal"
          KEYSTORE: ${{ steps.keystore.outputs.filePath }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PLAY_API_CREDENTIALS: ${{ steps.play_api_credentials.outputs.filePath }}

      - name: Build app without Keystore (Fallback)
        if: steps.check_keystore.outputs.has_keystore != 'true'
        run: ./gradlew assembleRelease-with-debug-signing


      - name: Rename Files
        run: |
          mkdir -p app/build/outputs/apk/release/
          if [ -d "app/build/outputs/apk/release-with-debug-signing" ]; then
            cp app/build/outputs/apk/release-with-debug-signing/*.apk app/build/outputs/apk/release/
          fi
          mv app/build/outputs/apk/release/app-arm64-v8a-*.apk app/build/outputs/apk/release/nextplayer-v${{ env.VERSION_NAME }}-arm64-v8a.apk || true
          mv app/build/outputs/apk/release/app-armeabi-v7a-*.apk app/build/outputs/apk/release/nextplayer-v${{ env.VERSION_NAME }}-armeabi-v7a.apk || true
          mv app/build/outputs/apk/release/app-universal-*.apk app/build/outputs/apk/release/nextplayer-v${{ env.VERSION_NAME }}-universal.apk || true
          mv app/build/outputs/apk/release/app-x86-*.apk app/build/outputs/apk/release/nextplayer-v${{ env.VERSION_NAME }}-x86.apk || true
          mv app/build/outputs/apk/release/app-x86_64-*.apk app/build/outputs/apk/release/nextplayer-v${{ env.VERSION_NAME }}-x86_64.apk || true

      - name: Create or Update Release
        id: create_or_update_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: app/build/outputs/apk/release/nextplayer*
          draft: false
          name: v${{ env.VERSION_NAME }}

          make_latest: true
          generate_release_notes: true
          tag_name: v${{ env.VERSION_NAME }}
